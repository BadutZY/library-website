<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Perpustakaan Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.7.12/sweetalert2.all.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-bg: #f5f5f5;
            --text-color: #868686;
            --light-text: #fff;
            --border-radius: 8px;
            --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url(CSS/perpus.jpg);
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            z-index: -1;
        }

        .reset-container {
            background-color: white;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .reset-container h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 18px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: var(--secondary-color);
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary-color);
            color: var(--light-text);
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background-color: #2980b9;
        }

        .login-link {
            margin-top: 20px;
            display: block;
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 14px;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .reset-container {
                padding: 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2><i class="fas fa-lock"></i> Reset Password</h2>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username" required>
        </div>
        <div class="input-group">
            <label for="new-password">Password Baru</label>
            <input type="password" id="new-password" placeholder="Masukkan password baru" required>
            <i class="fas fa-eye password-toggle" id="new-password-toggle"></i>
        </div>
        <div class="input-group">
            <label for="confirm-password">Konfirmasi Password</label>
            <input type="password" id="confirm-password" placeholder="Konfirmasi password baru" required>
            <i class="fas fa-eye password-toggle" id="confirm-password-toggle"></i>
        </div>
        <button class="reset-btn" onclick="handleResetPassword()">Reset Password</button>
        <a href="login.html" class="login-link">Login</a>
    </div>

    <script>
        // Handle password reset
        function handleResetPassword() {
            const username = document.getElementById('username').value.trim();
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();

            // Basic validation
            if (!username || !newPassword || !confirmPassword) {
                Swal.fire({
                    title: 'Error',
                    text: 'Semua kolom harus diisi!',
                    icon: 'error',
                    confirmButtonColor: '#3498db'
                });
                return;
            }

            if (newPassword !== confirmPassword) {
                Swal.fire({
                    title: 'Error',
                    text: 'Password baru dan konfirmasi password tidak cocok!',
                    icon: 'error',
                    confirmButtonColor: '#3498db'
                });
                return;
            }

            // Check if username exists
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(user => user.username === username);

            if (userIndex === -1) {
                Swal.fire({
                    title: 'Error',
                    text: 'Username tidak ditemukan!',
                    icon: 'error',
                    confirmButtonColor: '#3498db'
                });
                return;
            }

            // Update password
            users[userIndex].password = newPassword;
            localStorage.setItem('users', JSON.stringify(users));

            // Show success message and redirect to login
            Swal.fire({
                title: 'Reset Password Berhasil',
                text: 'Password Anda telah diperbarui. Silakan login dengan password baru.',
                icon: 'success',
                confirmButtonColor: '#3498db'
            }).then(() => {
                window.location.href = 'login.html';
            });
        }

        // Allow reset with Enter key
        document.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                handleResetPassword();
            }
        });

        // Password visibility toggle for new password field
        const newPasswordInput = document.getElementById('new-password');
        const newPasswordToggle = document.getElementById('new-password-toggle');

        newPasswordToggle.addEventListener('click', () => {
            if (newPasswordInput.type === 'password') {
                newPasswordInput.type = 'text';
                newPasswordToggle.classList.remove('fa-eye');
                newPasswordToggle.classList.add('fa-eye-slash');
            } else {
                newPasswordInput.type = 'password';
                newPasswordToggle.classList.remove('fa-eye-slash');
                newPasswordToggle.classList.add('fa-eye');
            }
        });

        // Password visibility toggle for confirm password field
        const confirmPasswordInput = document.getElementById('confirm-password');
        const confirmPasswordToggle = document.getElementById('confirm-password-toggle');

        confirmPasswordToggle.addEventListener('click', () => {
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                confirmPasswordToggle.classList.remove('fa-eye');
                confirmPasswordToggle.classList.add('fa-eye-slash');
            } else {
                confirmPasswordInput.type = 'password';
                confirmPasswordToggle.classList.remove('fa-eye-slash');
                confirmPasswordToggle.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
