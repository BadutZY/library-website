<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Perpustakaan Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.7.12/sweetalert2.all.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-bg: #f5f5f5;
            --text-color: #868686;
            --light-text: #fff;
            --border-radius: 8px;
            --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url(CSS/perpus.jpg);
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            z-index: -1;
        }

        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 18px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: var(--secondary-color);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary-color);
            color: var(--light-text);
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #2980b9;
        }

        .register-link, .forgot-password-link {
            margin-top: 20px;
            display: block;
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 14px;
        }

        .register-link:hover, .forgot-password-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2><i class="fas fa-book"></i> Login Perpustakaan</h2>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
            <i class="fas fa-eye password-toggle" id="password-toggle"></i>
        </div>
        <button class="login-btn" onclick="handleLogin()">Login</button>
        <a href="register.html" class="register-link">Register</a>
        <a href="reset-password.html" class="forgot-password-link">Reset Password</a>
    </div>

    <script>
        // Handle login
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Basic validation
            if (!username || !password) {
                Swal.fire({
                    title: 'Error',
                    text: 'Username dan password harus diisi!',
                    icon: 'error',
                    confirmButtonColor: '#3498db'
                });
                return;
            }

            // Check for admin credentials
            if (username === 'Fritzy' && password === 'Fritzy123') {
                localStorage.setItem('user', JSON.stringify({ username: username, isAdmin: true }));
                Swal.fire({
                    title: 'Login Berhasil',
                    text: 'Selamat datang, Admin!',
                    icon: 'success',
                    confirmButtonColor: '#3498db'
                }).then(() => {
                    window.location.href = 'Perpus.html';
                });
                return;
            }

            // Check credentials against stored users
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username && u.password === password);

            if (!user) {
                Swal.fire({
                    title: 'Error',
                    text: 'Username atau password salah!',
                    icon: 'error',
                    confirmButtonColor: '#3498db'
                });
                return;
            }

            // Store logged-in user
            localStorage.setItem('user', JSON.stringify({ username: username, isAdmin: false }));
            Swal.fire({
                title: 'Login Berhasil',
                text: `Selamat datang, ${username}!`,
                icon: 'success',
                confirmButtonColor: '#3498db'
            }).then(() => {
                window.location.href = 'Perpus.html';
            });
        }

        // Allow login with Enter key
        document.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // Password visibility toggle
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('password-toggle');

        passwordToggle.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordToggle.classList.remove('fa-eye');
                passwordToggle.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordToggle.classList.remove('fa-eye-slash');
                passwordToggle.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
